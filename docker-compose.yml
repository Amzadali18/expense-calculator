version: '3.8'

services:
  backend:
    build: ./backend
    expose:
      - "5000"
    environment:
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - SES_SENDER_EMAIL=${SES_SENDER_EMAIL}
    restart: always

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always